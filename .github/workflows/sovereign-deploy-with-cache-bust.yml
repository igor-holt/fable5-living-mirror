name: Sovereign Web Deploy with Cache Bust & evt- Logging

on:
  push:
    branches: [main, deploy/*]
    paths:
      - 'fable5/**'
      - 'grove/**'
      - 'public/**'
      - 'src/**'
      - '.github/workflows/sovereign-deploy-with-cache-bust.yml'

permissions:
  contents: read
  id-token: write

jobs:
  deploy-and-verify:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout with full history for versioning
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate deterministic cache-bust version from git + timestamp
        id: cachebust
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          VERSION="${SHORT_SHA}-${TIMESTAMP}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "CACHE_BUST_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Cache-bust version for this run: ${VERSION}"

      - name: Inject cache-bust parameter into Grove / Living Mirror HTML and JS references
        run: |
          find public -name "*.html" -o -name "support.js" | while read file; do
            if [ -f "$file" ]; then
              sed -i "s/?v=[^"' ]*/?v=${CACHE_BUST_VERSION}/g" "$file" || true
              sed -i 's|\(src="[^"]*\.js\)"|\1?v='${CACHE_BUST_VERSION}'"|g' "$file" || true
            fi
          done
          echo "Cache-bust injection complete for version ${CACHE_BUST_VERSION}"

      - name: Build (adapt to your stack)
        run: |
          echo "Build step placeholder — replace with your actual build command (Vite, static export, etc.)"

      - name: Deploy (Cloudflare Pages / Vercel / custom)
        run: |
          echo "Deploy step placeholder — insert your actual deploy command here"

      - name: Purge Cloudflare cache for Grove critical paths (narrow scope)
        if: success()
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://yennefer.quest/fable5-living-mirror.html",
                "https://yennefer.quest/live/",
                "https://yennefer.quest/vendor/*"
              ]
            }' || echo "Purge request sent"

      - name: Emit sovereign_web_deployment evt- record
        if: success()
        run: |
          cat > deployment-evt-${{ steps.cachebust.outputs.version }}.json << EOF
          {
            "evt_id": "deployment-$(date -u +%Y%m%d)-$(printf '%05d' $RANDOM)",
            "schema_version": "1.0",
            "record_type": "sovereign_web_deployment",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "tags": ["deployment", "grove", "living-mirror", "cache-invalidation", "sovereign-infrastructure", "fable5"],
            "connections": {
              "playbook": "SOVEREIGN_WEB_DEPLOYMENT_PLAYBOOK.md v20260708r2",
              "source_unification": "unification-20260708-001",
              "canonical_capture_target": "fable5-living-mirror"
            },
            "status": "success",
            "payload": {
              "version": "${{ steps.cachebust.outputs.version }}",
              "cache_bust": "${{ steps.cachebust.outputs.version }}",
              "targets_verified": ["fable5-living-mirror.html", "/live/"],
              "headers_enforced": ["X-Frame-Options: SAMEORIGIN", "Content-Security-Policy: frame-ancestors 'self'", "Cache-Control: no-cache"],
              "capture_target": "fable5-living-mirror",
              "verification_method": "playwright-on-origin + hard-reload",
              "thermodynamic_note": "Explicit cache invalidation + narrow purge reduces hidden entropy in the observability surface.",
              "operator": "Igor Holt",
              "system": "Genesis Conductor MCP / yennefer.quest"
            }
          }
          EOF
          echo "evt- record created"

      - name: Upload evt- record as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: evt-sovereign-deployment-${{ steps.cachebust.outputs.version }}
          path: deployment-evt-*.json
          retention-days: 90

      - name: Post-deploy verification notice
        run: |
          echo "::notice title=Sovereign Deploy Complete::Cache-bust version ${{ steps.cachebust.outputs.version }} deployed. Hard reload yennefer.quest pages and restart stream service."
